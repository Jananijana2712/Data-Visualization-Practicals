<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 Data Visualization with Chartist.js</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.css">
  <style>
    .ct-chart {
      width: 100%;
      height: 400px;
    }
  </style>
</head>
<body>

  <h1>COVID-19 Data Visualization - only Whole Numbers</h1>
  <div class="ct-chart"></div>

  <!-- Chartist.js library -->
  <script src="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.js"></script>
  <script>
    new Chartist.Line('.ct-chart', {
      labels: [1, 2, 3, 4, 5, 6, 7, 8], // Representing days or dates
      series: [
        [100, 120, 130, 150, 160, 170, 180, 190], // Confirmed cases
        [5, 55, 61, 8, 10, 11, 12, 15],             // Deaths
        [50, 5, 6, 65, 70, 75, 80, 85],         // Recoveries
        [45, 50, 55, 55, 60, 65, 70, 75]          // Active cases
      ]
    }, {
      high: 200,
      low: 0,
      fullWidth: true,
      axisY: {
        onlyInteger: true,
        offset: 20
      }
    });
  </script>

</body>
</html>
