<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 Area Line Chart with Chartist.js</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.css">
  <style>
    .ct-chart {
      width: 100%;
      height: 400px;
    }
    /* Custom color for the area under the line */
    .ct-series-a .ct-area {
      fill: rgba(248, 122, 83, 0.4); /* Light version of #F87A53 for area */
    }
    .ct-series-a .ct-line {
      stroke: #53f892; /* Darker version of #F87A53 for line */
    }
  </style>
</head>
<body>

  <h1>COVID-19 Area Line Chart</h1>
  <div class="ct-chart"></div>

  <!-- Chartist.js library -->
  <script src="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.js"></script>
  <script>
    new Chartist.Line('.ct-chart', {
      labels: [1, 2, 3, 4, 5, 6, 7, 8], // Representing days
      series: [
        [10, 20, 30, 25, 40, 50, 70, 80] // Confirmed COVID-19 cases
      ]
    }, {
      low: 0,
      showArea: true
    });
  </script>

</body>
</html>
