<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 Quarterly Data</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.css">
  <style>
    .ct-chart {
      width: 100%;
      height: 400px;
    }
    .ct-series-a .ct-bar { stroke: #BFECFF; } /* Color for Cases */
    .ct-series-b .ct-bar { stroke: #CDC1FF; } /* Color for Deaths */
    .ct-series-c .ct-bar { stroke: #FFCCEA; } /* Color for Recoveries */
  </style>
</head>
<body>

  <h1>COVID-19 Quarterly Report</h1>
  <div class="ct-chart"></div>

  <!-- Required libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.js"></script>

  <script>
    // COVID-19 dataset with quarterly data for cases, deaths, and recoveries
    new Chartist.Bar('.ct-chart', {
      labels: ['Q1', 'Q2', 'Q3', 'Q4'],
      series: [
        {name: 'Cases', data: [90000, 110000, 150000, 130000]},
        {name: 'Deaths', data: [50000, 80000, 120000, 100000]},
        {name: 'Recoveries', data: [70000, 90000, 130000, 120000]}
      ]
    }, {
      seriesBarDistance: 10,
      axisX: {
        offset: 60
      },
      axisY: {
        offset: 80,
        labelInterpolationFnc: function(value) {
          return value + ' cases';
        },
        scaleMinSpace: 15
      }
    });
  </script>

</body>
</html>
