<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 Pie Chart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.css">
  <style>
    .ct-chart {
      width: 100%;
      height: 400px;
    }
    .ct-series-a .ct-slice { stroke: #FF5733; } /* Color for new cases (Red) */
    .ct-series-b .ct-slice { stroke: #33FF57; } /* Color for recoveries (Green) */
    .ct-series-c .ct-slice { stroke: #3357FF; } /* Color for deaths (Blue) */
  </style>
</head>
<body>

  <h1>COVID-19 Pie Chart</h1>
  <div class="ct-chart"></div>

  <!-- Required libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.js"></script>

  <script>
    // COVID-19 dataset for new cases, recoveries, and deaths
    var data = {
      series: [450000, 300000, 50000] // Example data: new cases, recoveries, deaths
    };

    var sum = function(a, b) { return a + b };

    new Chartist.Pie('.ct-chart', data, {
      labelInterpolationFnc: function(value) {
        return Math.round(value / data.series.reduce(sum) * 100) + '%';
      }
    });
  </script>

</body>
</html>
