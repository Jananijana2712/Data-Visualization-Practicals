<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 Data Visualization with Chartist.js</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.css">
  <style>
    .ct-chart {
      width: 100%;
      height: 400px;
    }
    /* Custom colors for the lines */
    .ct-series-a .ct-line {
      stroke: #C96868;
      stroke-width: 5px;
    }
    .ct-series-b .ct-line {
      stroke: #CDC1FF;
      stroke-width: 2px;
    }
    .ct-series-c .ct-line {
      stroke: #FFCCEA;
      stroke-width: 3px;
      stroke-dasharray: 7px; /* Optional: dashed line style for variety */
    }
  </style>
</head>
<body>

  <h1>COVID-19 Data Visualization</h1>
  <div class="ct-chart"></div>

  <!-- Chartist.js library -->
  <script src="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.js"></script>
  <script>
    new Chartist.Line('.ct-chart', {
      labels: ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5'], // Replace with actual dates or days
      series: [
        [100, 150, 120, 130, 160], // Example: confirmed cases
        [5, 10, 7, 12, 8],         // Example: deaths
        [80, 90, 100, 105, 110]    // Example: recoveries
      ]
    }, {
      fullWidth: true,
      chartPadding: {
        right: 40
      },
      axisY: {
        onlyInteger: true
      }
    });
  </script>

</body>
</html>
