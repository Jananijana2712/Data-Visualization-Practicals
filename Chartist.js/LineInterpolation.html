<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 Line Interpolation Chart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.css">
  <style>
    .ct-chart {
      width: 100%;
      height: 400px;
    }
    /* Custom colors for the lines */
    .ct-series-a .ct-line {
      stroke: #CB9DF0;
    }
    .ct-series-b .ct-line {
      stroke: #FF8080;
    }
    .ct-point {
      stroke-width: 5px;
    }
  </style>
</head>
<body>

  <h1>COVID-19 Line Interpolation Chart</h1>
  <div class="ct-chart"></div>

  <!-- Chartist.js library -->
  <script src="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.js"></script>
  <script>
    var chart = new Chartist.Line('.ct-chart', {
      labels: [1, 2, 3, 4, 5], // Example days
      series: [
        [100, 120, 25, 55, 110],   // Daily new cases
        [50, 60, 130, 150, 45]       // Daily recoveries
      ]
    }, {
      lineSmooth: Chartist.Interpolation.simple({
        divisor: 2
      }),
      fullWidth: true,
      chartPadding: {
        right: 20
      },
      low: 0
    });
  </script>

</body>
</html>
