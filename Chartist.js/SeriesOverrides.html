<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 Series Overrides Chart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.css">
  <style>
    .ct-chart {
      width: 100%;
      height: 400px;
    }
    /* Custom colors for each series */
    .ct-series-a .ct-line, .ct-series-a .ct-point, .ct-series-a .ct-area {
      stroke: #D0BFFF;
      fill: #D0BFFF;
    }
    .ct-series-b .ct-line, .ct-series-b .ct-point, .ct-series-b .ct-area {
      stroke: #F7B5CA;
      fill: #F7B5CA;
    }
    .ct-series-c .ct-line, .ct-series-c .ct-point, .ct-series-c .ct-area {
      stroke: #C39898;
      fill: #C39898;
    }
  </style>
</head>
<body>

  <h1>COVID-19 Series Overrides Chart</h1>
  <div class="ct-chart"></div>

  <!-- Chartist.js library -->
  <script src="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.js"></script>
  <script>
    var chart = new Chartist.Line('.ct-chart', {
      labels: ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5', 'Day 6', 'Day 7', 'Day 8'],
      series: [{
        name: 'new-cases',
        data: [500, 700, 400, 600, 500, 450, 700, 550] // New cases
      }, {
        name: 'recoveries',
        data: [300, 400, 600, 500, 450, 500, 550, 600] // Recoveries
      }, {
        name: 'hospitalizations',
        data: [200, 250, 300, 200, 150, 180, 200, 220] // Hospitalizations
      }]
    }, {
      fullWidth: true,
      series: {
        'new-cases': {
          lineSmooth: Chartist.Interpolation.step()
        },
        'recoveries': {
          lineSmooth: Chartist.Interpolation.simple(),
          showArea: true
        },
        'hospitalizations': {
          showPoint: false
        }
      }
    }, [
      ['screen and (max-width: 320px)', {
        series: {
          'new-cases': {
            lineSmooth: Chartist.Interpolation.none()
          },
          'recoveries': {
            lineSmooth: Chartist.Interpolation.none(),
            showArea: false
          },
          'hospitalizations': {
            lineSmooth: Chartist.Interpolation.none(),
            showPoint: true
          }
        }
      }]
    ]);
  </script>

</body>
</html>
