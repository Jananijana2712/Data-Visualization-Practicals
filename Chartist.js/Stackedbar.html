<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 Stacked Bar Chart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.css">
  <style>
    .ct-chart {
      width: 100%;
      height: 400px;
    }
    .ct-series-a .ct-bar { stroke: #789DBC; } /* Color for Cases */
    .ct-series-b .ct-bar { stroke: #CDC1FF; } /* Color for Deaths */
    .ct-series-c .ct-bar { stroke: #C96868; } /* Color for Recoveries */
  </style>
</head>
<body>

  <h1>COVID-19 Stacked Bar Chart</h1>
  <div class="ct-chart"></div>

  <!-- Required libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.js"></script>

  <script>
    // COVID-19 stacked dataset with quarterly data for cases, deaths, and recoveries
    new Chartist.Bar('.ct-chart', {
      labels: ['Q1', 'Q2', 'Q3', 'Q4'],
      series: [
        {name: 'Cases', data: [800000, 1200000, 1400000, 1300000]},
        {name: 'Deaths', data: [200000, 400000, 500000, 300000]},
        {name: 'Recoveries', data: [100000, 200000, 400000, 600000]}
      ]
    }, {
      stackBars: true,
      axisY: {
        labelInterpolationFnc: function(value) {
          return (value / 1000) + 'k';
        }
      }
    }).on('draw', function(data) {
      if (data.type === 'bar') {
        data.element.attr({
          style: 'stroke-width: 30px'
        });
      }
    });
  </script>

</body>
</html>
