<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 Line Chart with SVG Path Animations</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.css">
  <style>
    .ct-chart {
      width: 100%;
      height: 400px;
    }
  </style>
</head>
<body>

  <h1>COVID-19 Line Chart with SVG Path Animations</h1>
  <div class="ct-chart"></div>

  <!-- Chartist.js library -->
  <script src="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.js"></script>
  <script>
    var chart = new Chartist.Line('.ct-chart', {
      labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
      series: [
        [120, 150, 130, 170, 180, 160], // Example: Daily confirmed cases
        [80, 90, 70, 100, 60, 110],      // Example: Daily recoveries
        [50, 88, 74, 69, 40, 32]                // Example: Daily deaths
      ]
    }, {
      low: 0,
      showArea: true,
      showPoint: false,
      fullWidth: true
    });

    chart.on('draw', function(data) {
      if(data.type === 'line' || data.type === 'area') {
        data.element.animate({
          d: {
            begin: 2000 * data.index,
            dur: 2000,
            from: data.path.clone().scale(1, 0).translate(0, data.chartRect.height()).stringify(),
            to: data.path.clone().stringify(),
            easing: Chartist.Svg.Easing.easeOutQuint
          }
        });
      }
    });
  </script>

</body>
</html>
