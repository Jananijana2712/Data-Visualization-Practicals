<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 Pie Chart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.css">
  <style>
    .ct-chart {
      width: 100%;
      height: 400px;
    }
    .ct-series-a .ct-slice { stroke: #FF5733; } /* New Cases (Red) */
    .ct-series-b .ct-slice { stroke: #33FF57; } /* Recoveries (Green) */
    .ct-series-c .ct-slice { stroke: #3357FF; } /* Deaths (Blue) */
  </style>
</head>
<body>

  <h1>COVID-19 Pie Chart with Custom Labels</h1>
  <div class="ct-chart"></div>

  <!-- Required libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.js"></script>

  <script>
    // COVID-19 dataset: new cases, recoveries, and deaths
    var data = {
      labels: ['New Cases', 'Recoveries', 'Deaths'],
      series: [450000, 300000, 50000] // Example data
    };

    var options = {
      labelInterpolationFnc: function(value) {
        return value[0]; // Return the label for the value
      }
    };

    var responsiveOptions = [
      ['screen and (min-width: 640px)', {
        chartPadding: 30,
        labelOffset: 100,
        labelDirection: 'explode',
        labelInterpolationFnc: function(value) {
          return value; // Show full label on larger screens
        }
      }],
      ['screen and (min-width: 1024px)', {
        labelOffset: 80,
        chartPadding: 20
      }]
    ];

    new Chartist.Pie('.ct-chart', data, options, responsiveOptions);
  </script>

</body>
</html>
