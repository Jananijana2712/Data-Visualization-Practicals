<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 Weekly Report</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.css">
  <style>
    .ct-chart {
      width: 100%;
      height: 400px;
    }
    .ct-series-a .ct-bar { stroke: #624E88; } /* Color for Series 1 */
    .ct-series-b .ct-bar { stroke: #D2E0FB; } /* Color for Series 2 */
  </style>
</head>
<body>

  <h1>COVID-19 Weekly Cases and Recoveries</h1>
  <div class="ct-chart"></div>

  <!-- Required libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.js"></script>

  <script>
    // COVID-19 dataset for daily cases and recoveries
    new Chartist.Bar('.ct-chart', {
      labels: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'],
      series: [
        {name: 'Cases', data: [1200, 1500, 1700, 1100, 1300, 1800, 1600]},  // Series 1
        {name: 'Recoveries', data: [900, 1100, 1400, 1000, 1200, 1500, 1300]}  // Series 2
      ]
    }, {
      seriesBarDistance: 10,
      reverseData: true,
      horizontalBars: true,
      axisY: {
        offset: 70
      }
    });
  </script>

</body>
</html>
