<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 Weekly Data</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.css">
  <style>
    .ct-chart {
      width: 100%;
      height: 400px;
    }
    .ct-series-a .ct-bar { stroke: #FF6F61; } /* Color for new cases */
    .ct-series-b .ct-bar { stroke: #6EB5A5; } /* Color for recoveries */
  </style>
</head>
<body>

  <h1>COVID-19 Label placement</h1>
  <div class="ct-chart"></div>

  <!-- Required libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.js"></script>

  <script>
    // COVID-19 dataset for new cases and recoveries by day of the week
    new Chartist.Bar('.ct-chart', {
      labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
      series: [
        [50, 40, 30, 70, 60, 100, 30], // New COVID-19 cases
        [30, 20, 90, 50, 40, 60, 40]   // Recoveries
      ]
    }, {
      axisX: {
        // On the x-axis start means top and end means bottom
        position: 'start'
      },
      axisY: {
        // On the y-axis start means left and end means right
        position: 'end'
      }
    });
  </script>

</body>
</html>
