<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 Quarterly Report</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.css">
  <style>
    .ct-chart {
      width: 100%;
      height: 400px;
    }
    .ct-series-a .ct-bar { stroke: #FF6384; } /* Color for Series 1 (Cases) */
    .ct-series-b .ct-bar { stroke: #36A2EB; } /* Color for Series 2 (Recoveries) */
    .ct-series-c .ct-bar { stroke: #FFCE56; } /* Color for Series 3 (Tests) */
    .ct-series-d .ct-bar { stroke: #4BC0C0; } /* Color for Series 4 (Hospitalizations) */
    .ct-series-e .ct-bar { stroke: #9966FF; } /* Color for Series 5 (Vaccinations) */
  </style>
</head>
<body>

  <h1>COVID-19 Extreme responsive configuration</h1>
  <div class="ct-chart"></div>

  <!-- Required libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.js"></script>

  <script>
    new Chartist.Bar('.ct-chart', {
      labels: ['Quarter 1', 'Quarter 2', 'Quarter 3', 'Quarter 4'],
      series: [
        [20000, 15000, 30000, 25000], // Series 1: Cases
        [15000, 12000, 25000, 20000], // Series 2: Recoveries
        [50000, 60000, 70000, 80000],  // Series 3: Tests
        [3000, 2500, 4000, 3500],      // Series 4: Hospitalizations
        [50000, 45000, 60000, 55000]   // Series 5: Vaccinations
      ]
    }, {
      stackBars: true,
      axisX: {
        labelInterpolationFnc: function(value) {
          return value.split(/\s+/).map(function(word) {
            return word[0];
          }).join('');
        }
      },
      axisY: {
        offset: 20
      }
    }, [
      ['screen and (min-width: 400px)', {
        reverseData: true,
        horizontalBars: true,
        axisX: {
          labelInterpolationFnc: Chartist.noop
        },
        axisY: {
          offset: 60
        }
      }],
      ['screen and (min-width: 800px)', {
        stackBars: false,
        seriesBarDistance: 10
      }],
      ['screen and (min-width: 1000px)', {
        reverseData: false,
        horizontalBars: false,
        seriesBarDistance: 15
      }]
    ]);
  </script>

</body>
</html>
