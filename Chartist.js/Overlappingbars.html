<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COVID-19 Overlapping Bar Chart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.css">
  <style>
    .ct-chart {
      width: 100%;
      height: 400px;
    }
    /* Custom colors for each series */
    .ct-series-a .ct-bar {
      stroke: #6CBEC7;
    }
    .ct-series-b .ct-bar {
      stroke: #CADABF;
    }
  </style>
</head>
<body>

  <h1>COVID-19 Monthly Cases and Recoveries</h1>
  <div class="ct-chart"></div>

  <!-- Required libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chartist@0.11.4/dist/chartist.min.js"></script>

  <script>
    var data = {
      labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
      series: [
        [15, 20, 25, 30, 20, 40, 35, 50, 45, 55, 40, 60], // COVID-19 Cases
        [10, 18, 20, 25, 18, 30, 25, 40, 35, 50, 30, 45]  // COVID-19 Recoveries
      ]
    };

    var options = {
      seriesBarDistance: 10,
      axisY: {
        onlyInteger: true
      }
    };

    var responsiveOptions = [
      ['screen and (max-width: 640px)', {
        seriesBarDistance: 5,
        axisX: {
          labelInterpolationFnc: function (value) {
            return value[0];  // Show first letter of each month on smaller screens
          }
        }
      }]
    ];

    new Chartist.Bar('.ct-chart', data, options, responsiveOptions);
  </script>

</body>
</html>
