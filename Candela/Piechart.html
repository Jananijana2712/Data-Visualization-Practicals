<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pie Chart - Movie Reviews by Genre</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        #pieChart {
            width: 80%;
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>Pie Chart - Movie Reviews by Genre</h1>
    <canvas id="pieChart"></canvas>

    <script>
        const genres = ['Action', 'Drama', 'Comedy', 'Horror', 'Romance'];
        const reviewCounts = [120, 90, 75, 50, 40];

        const ctx = document.getElementById('pieChart').getContext('2d');
        const pieChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: genres,
                datasets: [{
                    label: 'Number of Reviews',
                    data: reviewCounts,
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.2)',
                        'rgba(54, 162, 235, 0.2)',
                        'rgba(255, 206, 86, 0.2)',
                        'rgba(75, 192, 192, 0.2)',
                        'rgba(153, 102, 255, 0.2)'
                    ],
                    borderColor: [
                        'rgba(255, 99, 132, 1)',
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 206, 86, 1)',
                        'rgba(75, 192, 192, 1)',
                        'rgba(153, 102, 255, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                    },
                    tooltip: {
                        callbacks: {
                            label: function(tooltipItem) {
                                return `${tooltipItem.label}: ${tooltipItem.raw} reviews`;
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
