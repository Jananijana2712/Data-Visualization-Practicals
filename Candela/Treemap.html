<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Map - IMDb Movie Reviews Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/candela@1.2.1/dist/candela.js"></script>
    <style>
        #treeMap {
            width: 80%;
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>Tree Map - IMDb Movie Reviews Analysis</h1>
    <div id="treeMap"></div>

    <script>
        const data = [
            { genre: 'Action', reviews: 1200 },
            { genre: 'Drama', reviews: 850 },
            { genre: 'Comedy', reviews: 600 },
            { genre: 'Horror', reviews: 300 },
            { genre: 'Romance', reviews: 400 },
            { genre: 'Sci-Fi', reviews: 700 },
            { genre: 'Animation', reviews: 500 },
            { genre: 'Thriller', reviews: 450 },
            { genre: 'Documentary', reviews: 200 }
        ];

        const chart = new candela.Chart('#treeMap', {
            data: data,
            mark: 'rect',
            encodings: {
                x: { field: 'genre', type: 'ordinal' },
                y: { field: 'reviews', type: 'quantitative' }
            },
            width: 800,
            height: 400
        });

        chart.render();
    </script>
</body>
</html>
