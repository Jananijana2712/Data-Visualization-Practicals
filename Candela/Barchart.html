<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Quality Dataset Bar Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #myChart {
            width: 80%;
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>Average Alcohol Content in Red and White Wines</h1>
    <canvas id="myChart"></canvas>

    <script>
        // Example Wine Quality dataset (wine type, average alcohol content)
        const wineData = [
            { wineType: 'Red Wine', averageAlcohol: 10.2 },
            { wineType: 'White Wine', averageAlcohol: 9.8 }
        ];

        // Extracting wine types and average alcohol content
        const wineTypes = wineData.map(data => data.wineType);
        const averageAlcohol = wineData.map(data => data.averageAlcohol);

        // Creating the bar chart
        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: wineTypes,
                datasets: [{
                    label: 'Average Alcohol Content (%)',
                    data: averageAlcohol,
                    backgroundColor: 'rgba(255, 159, 64, 0.2)',
                    borderColor: 'rgba(255, 159, 64, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Alcohol Content (%)'
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Wine Type'
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
