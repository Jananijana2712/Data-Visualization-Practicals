<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Plot - IMDb Movie Review Scores</title>
    <script src="https://cdn.jsdelivr.net/npm/candela@1.2.1/dist/candela.js"></script>
    <style>
        #boxPlot {
            width: 80%;
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>Box Plot - IMDb Movie Review Scores</h1>
    <div id="boxPlot"></div>

    <script>
        const data = [
            { title: 'The Shawshank Redemption', min: 8.7, q1: 9.0, median: 9.3, q3: 9.5, max: 9.6 },
            { title: 'The Godfather', min: 8.5, q1: 9.0, median: 9.2, q3: 9.4, max: 9.6 },
            { title: 'The Dark Knight', min: 8.0, q1: 8.5, median: 9.0, q3: 9.1, max: 9.3 },
            { title: '12 Angry Men', min: 8.2, q1: 8.7, median: 9.0, q3: 9.1, max: 9.2 },
            { title: 'Schindler\'s List', min: 8.0, q1: 8.5, median: 8.9, q3: 9.0, max: 9.2 },
            { title: 'Pulp Fiction', min: 8.0, q1: 8.3, median: 8.9, q3: 9.0, max: 9.1 },
            { title: 'The Lord of the Rings: The Return of the King', min: 8.5, q1: 8.7, median: 9.0, q3: 9.1, max: 9.3 },
            { title: 'Forrest Gump', min: 8.1, q1: 8.4, median: 8.8, q3: 8.9, max: 9.0 },
            { title: 'Fight Club', min: 8.1, q1: 8.5, median: 8.8, q3: 9.0, max: 9.1 },
            { title: 'Inception', min: 8.0, q1: 8.4, median: 8.8, q3: 8.9, max: 9.0 }
        ];

        const chart = new candela.Chart('#boxPlot', {
            data: data,
            mark: 'boxplot',
            encodings: {
                x: 'title',
                y: { field: 'median', type: 'quantitative' },
                y0: { field: 'min' },
                y1: { field: 'max' },
                q1: { field: 'q1' },
                q3: { field: 'q3' }
            }
        });

        chart.render();
    </script>
</body>
</html>
