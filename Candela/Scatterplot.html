<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scatter Plot - IMDb Movie Ratings vs Number of Reviews</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        #scatterPlot {
            width: 80%;
            max-width: 1000px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>Scatter Plot - IMDb Movie Ratings vs Number of Reviews</h1>
    <canvas id="scatterPlot"></canvas>

    <script>
        const movieData = [
            { title: 'Movie A', rating: 8.5, reviews: 5000 },
            { title: 'Movie B', rating: 7.2, reviews: 3000 },
            { title: 'Movie C', rating: 9.0, reviews: 7000 },
            { title: 'Movie D', rating: 6.5, reviews: 1500 },
            { title: 'Movie E', rating: 8.0, reviews: 4000 }
        ];

        // Prepare data for the scatter plot
        const scatterData = movieData.map(data => ({
            x: data.rating,
            y: data.reviews
        }));

        const ctx = document.getElementById('scatterPlot').getContext('2d');
        const scatterPlot = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'Ratings vs Number of Reviews',
                    data: scatterData,
                    backgroundColor: 'rgba(75, 192, 192, 1)',
                    pointRadius: 5
                }]
            },
            options: {
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'IMDb Ratings'
                        },
                        beginAtZero: true,
                        min: 0,
                        max: 10
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'Number of Reviews'
                        },
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
