<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Bar Chart - IMDb Movie Reviews</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* You can control the width here */
        #horizontalBarChart {
            width: 70%; /* Change this value to adjust the chart width */
            max-width: 1000px; /* You can set a max width as well */
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>Horizontal Bar Chart - IMDb Movie Review Scores</h1>
    <canvas id="horizontalBarChart"></canvas>

    <script>
        const movieData = [
            { title: 'The Shawshank Redemption', score: 9.3 },
            { title: 'The Godfather', score: 9.2 },
            { title: 'The Dark Knight', score: 9.0 },
            { title: '12 Angry Men', score: 9.0 },
            { title: 'Schindler\'s List', score: 8.9 },
            { title: 'Pulp Fiction', score: 8.9 },
            { title: 'The Lord of the Rings: The Return of the King', score: 9.0 },
            { title: 'Forrest Gump', score: 8.8 },
            { title: 'Fight Club', score: 8.8 },
            { title: 'Inception', score: 8.8 }
        ];

        const movieTitles = movieData.map(data => data.title);
        const reviewScores = movieData.map(data => data.score);

        const ctx = document.getElementById('horizontalBarChart').getContext('2d');
        const horizontalBarChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: movieTitles,
                datasets: [{
                    label: 'Review Score',
                    data: reviewScores,
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                indexAxis: 'y', // To make the bars horizontal
                scales: {
                    x: { beginAtZero: true, max: 10 } // IMDb scores are from 0 to 10
                }
            }
        });
    </script>
</body>
</html>
