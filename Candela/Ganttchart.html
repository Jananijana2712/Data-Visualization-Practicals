<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt Chart - Movie Production Phases</title>
    <script src="https://cdn.jsdelivr.net/npm/candela@1.2.1/dist/candela.js"></script>
    <style>
        #ganttChart {
            width: 80%;
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>Gantt Chart - Movie Production Phases</h1>
    <div id="ganttChart"></div>

    <script>
        const data = [
            { phase: 'Pre-Production', start: '2023-01-01', end: '2023-03-31' },
            { phase: 'Production', start: '2023-04-01', end: '2023-08-31' },
            { phase: 'Post-Production', start: '2023-09-01', end: '2023-12-31' }
        ];

        const chart = new candela.Chart('#ganttChart', {
            data: data,
            mark: 'bar',
            encodings: {
                x: { field: 'start', type: 'temporal' },
                x1: { field: 'end' },
                y: { field: 'phase', type: 'ordinal' }
            }
        });

        chart.render();
    </script>
</body>
</html>
