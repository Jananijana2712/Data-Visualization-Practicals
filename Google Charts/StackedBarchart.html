<!DOCTYPE html>
<html>
  <head>
    <title>Stacked Bar Chart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {packages: ['corechart', 'bar']});
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ['Month', 'Confirmed Cases', 'Recovered Cases', 'Deaths'],
          ['March', 1000, 100, 10],
          ['April', 20000, 5000, 500],
          ['May', 30000, 15000, 1000],
          ['June', 50000, 25000, 2000],
          ['July', 70000, 40000, 3000]
        ]);

        var options = {
          title: 'COVID-19 Cases Stacked by Type',
          isStacked: true,
          hAxis: {title: 'Number of Cases'},
          vAxis: {title: 'Month'},
          colors: ['#824D74', '#BE7B72', '#F2613F']
        };

        var chart = new google.visualization.BarChart(document.getElementById('stacked_bar_chart'));
        chart.draw(data, options);
      }
    </script>
  </head>
  <body>
    <div id="stacked_bar_chart" style="width: 900px; height: 500px;"></div>
  </body>
</html>
