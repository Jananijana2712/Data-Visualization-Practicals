<!DOCTYPE html>
<html>
  <head>
    <title>COVID-19 Area Chart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      // Load the Visualization API and the corechart package.
      google.charts.load('current', {'packages':['corechart']});

      // Set a callback to run when the Google Visualization API is loaded.
      google.charts.setOnLoadCallback(drawChart);

      // Callback that creates and populates a data table,
      // instantiates the Area Chart, passes in the data and draws it.
      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ['Date', 'Confirmed Cases'],
          ['March 2020',  1000],
          ['April 2020',  20000],
          ['May 2020',    30000],
          ['June 2020',   50000],
          ['July 2020',   70000],
          ['August 2020', 80000],
          ['September 2020', 100000],
          ['October 2020', 120000],
          ['November 2020', 150000],
          ['December 2020', 180000],
        ]);

        // Set chart options
        var options = {
          title: 'COVID-19 Confirmed Cases Over Time',
          hAxis: {title: 'Date'},
          vAxis: {title: 'Number of Cases'},
          legend: 'none',
          areaOpacity: 0.5, // Opacity for the filled area
          colors: ['#FF6347'], // Line and area color
          backgroundColor: '#f5f5f5'
        };

        // Instantiate and draw the chart, passing in the options.
        var chart = new google.visualization.AreaChart(document.getElementById('chart_div'));
        chart.draw(data, options);
      }
    </script>
  </head>

  <body>
    <!-- Div that will hold the Area Chart -->
    <div id="chart_div" style="width: 900px; height: 500px;"></div>
  </body>
</html>
