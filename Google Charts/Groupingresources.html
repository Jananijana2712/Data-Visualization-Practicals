<html>
<head>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <script type="text/javascript">
    google.charts.load('current', {'packages':['gantt']});
    google.charts.setOnLoadCallback(drawChart);

    function daysToMilliseconds(days) {
      return days * 24 * 60 * 60 * 1000;
    }

    function drawChart() {
      var data = new google.visualization.DataTable();
      data.addColumn('string', 'Task ID');
      data.addColumn('string', 'Task Name');
      data.addColumn('string', 'Resource');
      data.addColumn('date', 'Start Date');
      data.addColumn('date', 'End Date');
      data.addColumn('number', 'Duration');
      data.addColumn('number', 'Percent Complete');
      data.addColumn('string', 'Dependencies');

      data.addRows([
        ['Lockdown', 'Initial Lockdown', null,
         new Date(2020, 2, 15), new Date(2020, 5, 1), null,  100,  null],
        ['Vaccination', 'Vaccination Rollout', 'health',
         new Date(2020, 11, 14), new Date(2021, 11, 31), daysToMilliseconds(365), 70, 'Lockdown'],
        ['Case Spike', 'Case Spike due to Variants', null,
         new Date(2021, 5, 1), new Date(2021, 8, 30), daysToMilliseconds(120), 50, 'Vaccination'],
        ['Mask Mandate', 'Mandatory Mask Wearing', 'policy',
         new Date(2020, 3, 1), new Date(2021, 5, 1), daysToMilliseconds(365), 100, 'Lockdown'],
        ['End Lockdown', 'Phased End of Lockdown', 'policy',
         new Date(2020, 5, 1), new Date(2020, 11, 1), daysToMilliseconds(180), 100, 'Lockdown']
      ]);

      var options = {
        height: 400,
        gantt: {
          trackHeight: 30
        }
      };

      var chart = new google.visualization.Gantt(document.getElementById('chart_div'));

      chart.draw(data, options);
    }
  </script>
</head>
<body>
  <div id="chart_div"></div>
</body>
</html>
