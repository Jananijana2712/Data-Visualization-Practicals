<!DOCTYPE html>
<html>
  <head>
    <title>Bar-Column Chart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ['Month', 'Confirmed Cases', 'Deaths'],
          ['March', 150, 40],
          ['April', 250, 200],
          ['May', 450, 300],
          ['June', 700, 400],
          ['July', 900, 600]
        ]);

        var options = {
          title: 'COVID-19 Confirmed Cases and Deaths',
          hAxis: { title: 'Month' },
          vAxis: { title: 'Count' },
          colors: ['#A2678A', '#FACBEA'],
          isStacked: false // Set to true for stacked columns
        };

        var chart = new google.visualization.ColumnChart(document.getElementById('bar_column_chart'));
        chart.draw(data, options);
      }
    </script>
  </head>
  <body>
    <div id="bar_column_chart" style="width: 900px; height: 500px;"></div>
  </body>
</html>
