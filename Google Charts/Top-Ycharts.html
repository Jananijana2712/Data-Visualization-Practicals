<!DOCTYPE html>
<html>
  <head>
    <title>Top-Y Column Chart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ['Month', 'Confirmed Cases'],
          ['March', 1000],
          ['April', 20000],
          ['May', 30000],
          ['June', 50000],
          ['July', 70000]
        ]);

        var options = {
          title: 'COVID-19 Confirmed Cases with Top-Y Axis',
          hAxis: { title: 'Month' },
          vAxis: {
            title: 'Confirmed Cases',
            direction: -1  // This moves the axis to the top
          },
          legend: 'none',
          colors: ['#A2678A']
        };

        var chart = new google.visualization.ColumnChart(document.getElementById('top_y_column_chart'));
        chart.draw(data, options);
      }
    </script>
  </head>
  <body>
    <div id="top_y_column_chart" style="width: 900px; height: 500px;"></div>
  </body>
</html>
