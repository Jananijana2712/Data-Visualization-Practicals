<!DOCTYPE html>
<html>
  <head>
    <title>Top COVID-19 Confirmed Cases</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['bar']});
      google.charts.setOnLoadCallback(drawStuff);

      function drawStuff() {
        var data = new google.visualization.arrayToDataTable([
          ['Month', 'Confirmed Cases'],
          ['July', 70000],
          ['June', 50000],
          ['May', 30000],
          ['April', 20000],
          ['March', 1000]
        ]);

        var options = {
          title: 'Top COVID-19 Confirmed Cases',
          width: 900,
          legend: { position: 'none' },
          chart: {
            title: 'Top COVID-19 Confirmed Cases',
            subtitle: 'Confirmed Cases by Month'
          },
          bars: 'horizontal', // Required for Material Bar Charts.
          axes: {
            x: {
              0: { side: 'top', label: 'Confirmed Cases'} // Top x-axis.
            }
          },
          bar: { groupWidth: "90%" },
          colors: ['#A2678A'] // Custom color for the bars
        };

        var chart = new google.charts.Bar(document.getElementById('top_x_div'));
        chart.draw(data, options);
      };
    </script>
  </head>
  <body>
    <div id="top_x_div" style="width: 900px; height: 500px;"></div>
  </body>
</html>
