<html>
<head>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <script type="text/javascript">
    google.charts.load('current', {'packages':['scatter']});
    google.charts.setOnLoadCallback(drawChart);

    function drawChart() {

      var data = new google.visualization.DataTable();
      data.addColumn('number', 'Days Since Outbreak');
      data.addColumn('number', 'Cases');

      data.addRows([
        [0, 100],  [1, 200],  [2, 150],
        [3, 300],  [4, 400],  [5, 600],
        [6, 800],  [7, 900],  [8, 1100],
        [9, 1500], [10, 1800],[11, 2000],
        [12, 2200],[13, 2400],[14, 2600],
        [15, 3000],[16, 3500],[17, 4000],
        [18, 4500],[19, 5000],[20, 5500]
      ]);

      var options = {
        width: 800,
        height: 500,
        chart: {
          title: 'COVID-19 Daily Reported Cases',
          subtitle: 'Based on days since the outbreak'
        },
        axes: {
          x: {
            0: {side: 'top', label: 'Days Since Outbreak'}
          },
          y: {
            0: {label: 'Daily Cases'}
          }
        },
        colors: ['#662549'] // You can customize this color
      };

      var chart = new google.charts.Scatter(document.getElementById('scatter_top_x'));

      chart.draw(data, google.charts.Scatter.convertOptions(options));
    }
  </script>
</head>
<body>
  <div id="scatter_top_x" style="width: 800px; height: 500px;"></div>
</body>
</html>
