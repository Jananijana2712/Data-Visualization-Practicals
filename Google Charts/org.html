<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
        google.charts.load('current', {packages:["orgchart"]});
        google.charts.setOnLoadCallback(drawChart);

        function drawChart() {
            var data = new google.visualization.DataTable();
            data.addColumn('string', 'Name');
            data.addColumn('string', 'Manager');
            data.addColumn('string', 'ToolTip');

            // For each orgchart box, provide the name, manager, and tooltip to show.
            data.addRows([
                [{'v':'Dr. Smith', 'f':'Dr. Smith<div style="color:red; font-style:italic">Director of Health</div>'}, '', 'Director of Health'],
                [{'v':'Mr. Johnson', 'f':'Mr. Johnson<div style="color:red; font-style:italic">Chief Epidemiologist</div>'}, 'Dr. Smith', 'Chief Epidemiologist'],
                [{'v':'Dr. Lee', 'f':'Dr. Lee<div style="color:red; font-style:italic">Vaccine Coordinator</div>'}, 'Dr. Smith', 'Vaccine Coordinator'],
                [{'v':'Ms. Brown', 'f':'Ms. Brown<div style="color:red; font-style:italic">Public Relations</div>'}, 'Dr. Smith', 'Public Relations'],
                [{'v':'Dr. Patel', 'f':'Dr. Patel<div style="color:red; font-style:italic">Research Lead</div>'}, 'Mr. Johnson', 'Research Lead'],
                [{'v':'Dr. Green', 'f':'Dr. Green<div style="color:red; font-style:italic">Data Analyst</div>'}, 'Mr. Johnson', 'Data Analyst']
            ]);

            // Create the chart.
            var chart = new google.visualization.OrgChart(document.getElementById('chart_div'));
            // Draw the chart, setting the allowHtml option to true for the tooltips.
            chart.draw(data, {'allowHtml':true});
        }
    </script>
</head>
<body>
    <div id="chart_div"></div>
</body>
</html>
