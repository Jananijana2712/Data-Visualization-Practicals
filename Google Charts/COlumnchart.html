<!DOCTYPE html>
<html>
  <head>
    <title>Simple Column Chart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ['Month', 'Cases'],
          ['March', 1000],
          ['April', 20000],
          ['May', 30000],
          ['June', 50000],
          ['July', 70000]
        ]);

        var options = {
          title: 'COVID-19 Cases',
          hAxis: { title: 'Month' },
          vAxis: { title: 'Number of Cases' },
          legend: 'none'
        };

        var chart = new google.visualization.ColumnChart(document.getElementById('simple_column_chart'));
        chart.draw(data, options);
      }
    </script>
  </head>
  <body>
    <div id="simple_column_chart" style="width: 900px; height: 500px;"></div>
  </body>
</html>
