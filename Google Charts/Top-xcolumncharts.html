<!DOCTYPE html>
<html>
  <head>
    <title>Top-X Column Chart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ['Month', 'Confirmed Cases'],
          ['March', 1000],
          ['April', 20000],
          ['May', 30000],
          ['June', 50000],
          ['July', 70000]
        ]);

        var options = {
          title: 'COVID-19 Confirmed Cases with Top-X Axis',
          hAxis: {
            title: 'Month',
            direction: -1  // Moves X-axis to the top
          },
          vAxis: { title: 'Confirmed Cases' },
          legend: 'none',
          colors: ['#D6589F']  // Custom color for the bars
        };

        var chart = new google.visualization.ColumnChart(document.getElementById('top_x_column_chart'));
        chart.draw(data, options);
      }
    </script>
  </head>
  <body>
    <div id="top_x_column_chart" style="width: 900px; height: 500px;"></div>
  </body>
</html>
