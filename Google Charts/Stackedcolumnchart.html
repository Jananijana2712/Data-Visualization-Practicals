<!DOCTYPE html>
<html>
  <head>
    <title>Stacked Column Chart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ['Month', 'Confirmed', 'Recovered', 'Deaths'],
          ['March', 1000, 500, 10],
          ['April', 20000, 15000, 500],
          ['May', 30000, 25000, 700],
          ['June', 50000, 40000, 900],
          ['July', 70000, 55000, 1200]
        ]);

        var options = {
          title: 'COVID-19 Cases Breakdown',
          isStacked: true,
          hAxis: { title: 'Month' },
          vAxis: { title: 'Number of Cases' },
          colors: ['#6C5B7B', '#FF6969', '#2B3467']
        };

        var chart = new google.visualization.ColumnChart(document.getElementById('stacked_column_chart'));
        chart.draw(data, options);
      }
    </script>
  </head>
  <body>
    <div id="stacked_column_chart" style="width: 900px; height: 500px;"></div>
  </body>
</html>
