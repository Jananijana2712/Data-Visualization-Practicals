<!DOCTYPE html>
<html>
  <head>
    <title>COVID-19 Calendar Chart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load("current", {packages:["calendar"]});
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        var dataTable = new google.visualization.DataTable();
        dataTable.addColumn({ type: 'date', id: 'Date' });
        dataTable.addColumn({ type: 'number', id: 'Confirmed Cases' });

        // Sample data for confirmed COVID-19 cases per day
        dataTable.addRows([
          [ new Date(2020, 2, 4), 200 ],   // March 4, 2020
          [ new Date(2020, 2, 5), 300 ],   // March 5, 2020
          [ new Date(2020, 2, 6), 250 ],   // March 6, 2020
          [ new Date(2020, 3, 10), 500 ],  // April 10, 2020
          [ new Date(2020, 4, 15), 1000 ], // May 15, 2020
          [ new Date(2020, 6, 20), 2000 ], // July 20, 2020
          [ new Date(2020, 9, 5), 3000 ]   // October 5, 2020
        ]);

        var chart = new google.visualization.Calendar(document.getElementById('calendar_chart'));

        var options = {
          title: "COVID-19 Confirmed Cases (2020)",
          height: 350,
          colorAxis: {colors: ['#D80032', '#FF8989']} // Color gradient from light to dark red
        };

        chart.draw(dataTable, options);
      }
    </script>
  </head>
  <body>
    <div id="calendar_chart" style="width: 1000px; height: 350px;"></div>
  </body>
</html>
