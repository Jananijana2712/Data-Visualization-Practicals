<!DOCTYPE html>
<html>
  <head>
    <title>Scatter Plot</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ['Month', 'Confirmed Cases', 'Deaths'],
          ['March', 150, 40],
          ['April', 250, 200],
          ['May', 450, 300],
          ['June', 700, 400],
          ['July', 900, 60]
        ]);

        var options = {
          title: 'COVID-19 Confirmed Cases and Deaths Scatter Plot',
          hAxis: { title: 'Confirmed Cases' },
          vAxis: { title: 'Deaths' },
          legend: { position: 'top' },
          colors: ['#A2678A', '#FF407D'], // Different colors for confirmed cases and deaths
          series: {
            0: { pointShape: 'circle' }, // Shape for confirmed cases
            1: { pointShape: 'square' }   // Shape for deaths
          }
        };

        var chart = new google.visualization.ScatterChart(document.getElementById('scatter_plot'));
        chart.draw(data, options);
      }
    </script>
  </head>
  <body>
    <div id="scatter_plot" style="width: 900px; height: 500px;"></div>
  </body>
</html>
