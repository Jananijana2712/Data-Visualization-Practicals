<!DOCTYPE html>
<html>
  <head>
    <title>Dual-Y Column Chart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ['Month', 'Confirmed Cases', 'Deaths'],
          ['March', 1000, 50],
          ['April', 20000, 150],
          ['May', 30000, 200],
          ['June', 50000, 300],
          ['July', 70000, 500]
        ]);

        var options = {
          title: 'COVID-19: Confirmed Cases and Deaths',
          hAxis: { title: 'Month' },
          vAxes: {
            0: { title: 'Confirmed Cases' },
            1: { title: 'Deaths' }
          },
          seriesType: 'bars',
          series: {
            1: { type: 'line', targetAxisIndex: 1 }
          },
          colors: ['#D20062', '#5755FE']
        };

        var chart = new google.visualization.ComboChart(document.getElementById('dual_y_column_chart'));
        chart.draw(data, options);
      }
    </script>
  </head>
  <body>
    <div id="dual_y_column_chart" style="width: 900px; height: 500px;"></div>
  </body>
</html>
