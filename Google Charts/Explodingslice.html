<!DOCTYPE html>
<html>
  <head>
    <title>Exploding Slice</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ['Month', 'Confirmed Cases'],
          ['March', 1500],
          ['April', 25000],
          ['May', 45000],
          ['June', 70000],
          ['July', 90000]
        ]);

        var options = {
          title: 'COVID-19 Confirmed Cases Distribution (Exploded Slice)',
          pieSliceText: 'value',
          colors: ['#A2678A', '#B99470', '#DEAC80', '#DEAC80', '#B5C18E'],
          slices: {
            0: {offset: 0.2} // Exploding the first slice (March)
          }
        };

        var chart = new google.visualization.PieChart(document.getElementById('exploded_slice_chart'));
        chart.draw(data, options);
      }
    </script>
  </head>
  <body>
    <div id="exploded_slice_chart" style="width: 900px; height: 500px;"></div>
  </body>
</html>
