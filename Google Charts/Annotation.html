<!DOCTYPE html>
<html>
  <head>
    <title>COVID-19 Annotation Chart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      // Load the Visualization API and the annotationchart package.
      google.charts.load('current', {
        'packages': ['annotationchart']
      });

      // Set a callback to run when the Google Visualization API is loaded.
      google.charts.setOnLoadCallback(drawChart);

      // Callback that creates and populates a data table, 
      // instantiates the Annotation Chart, passes in the data and draws it.
      function drawChart() {
        var data = new google.visualization.DataTable();
        data.addColumn('date', 'Date');
        data.addColumn('number', 'Confirmed Cases');
        data.addColumn('string', 'Event'); // Annotation title
        data.addColumn('string', 'Note');  // Annotation description

        // Adding rows: Date, Number of confirmed cases, Title, Note
        data.addRows([
          [new Date(2020, 2, 11), 500, 'Lockdown Start', 'Countrywide lockdown begins'],
          [new Date(2020, 5, 10), 20000, 'First Wave Peak', 'First wave of cases reaches peak'],
          [new Date(2020, 11, 1), 10000, 'Vaccine Rollout', 'Mass vaccination starts'],
          [new Date(2021, 2, 1), 8000, 'Second Wave', 'Second wave begins'],
          [new Date(2021, 5, 1), 3000, 'Cases Drop', 'Cases significantly decrease'],
          [new Date(2021, 11, 1), 20000, 'Omicron Surge', 'New variant causes a surge in cases'],
          [new Date(2022, 3, 15), 1000, 'Recovery Phase', 'Cases back under control'],
        ]);

        // Set chart options
        var options = {
          displayAnnotations: true,
          thickness: 3,  // Line thickness
          colors: ['#E4B1F0'], // Line color
          dateFormat: 'MMM yyyy',
          displayZoomButtons: true
        };

        // Instantiate and draw the chart.
        var chart = new google.visualization.AnnotationChart(document.getElementById('chart_div'));
        chart.draw(data, options);
      }
    </script>
  </head>

  <body>
    <!-- Div that will hold the Annotation Chart -->
    <div id="chart_div" style="width: 900px; height: 500px;"></div>
  </body>
</html>
