<!DOCTYPE html>
<html>
  <head>
    <title>COVID-19 Region GeoChart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      // Load the Google Charts package
      google.charts.load('current', {
        'packages':['geochart'],
        'mapsApiKey': 'YOUR_GOOGLE_MAPS_API_KEY' // Add your API Key
      });

      // Set callback to draw the chart after loading
      google.charts.setOnLoadCallback(drawRegionsMap);

      function drawRegionsMap() {
        // Create a data table
        var data = google.visualization.arrayToDataTable([
          ['Country', 'Confirmed Cases'],
          ['United States', 33670000],
          ['India', 31137000],
          ['Brazil', 19802000],
          ['France', 5860000],
          ['Russia', 5980000],
          ['United Kingdom', 5440000],
          ['Italy', 4346000],
          ['Germany', 3783000],
          ['Spain', 3766000],
          ['Turkey', 5520000],
          // Add more countries and their confirmed cases here
        ]);

        // Set options for the GeoChart
        var options = {
          colorAxis: {colors: ['#e0f7fa', '#00796b']}, // Light to dark green
          backgroundColor: '#81d4fa', // Light blue background
          datalessRegionColor: '#f5f5f5', // Gray for no data
          defaultColor: '#f5f5f5',
        };

        // Create and draw the GeoChart
        var chart = new google.visualization.GeoChart(document.getElementById('regions_div'));
        chart.draw(data, options);
      }
    </script>
  </head>
  <body>
    <h1>COVID-19 Region GeoChart</h1>
    <div id="regions_div" style="width: 900px; height: 500px;"></div>
  </body>
</html>
