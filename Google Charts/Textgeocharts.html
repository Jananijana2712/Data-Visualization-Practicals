<!DOCTYPE html>
<html>
  <head>
    <title>COVID-19 Text GeoChart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      // Load the Visualization API and the GeoChart package.
      google.charts.load('current', {
        'packages': ['geochart'],
        'mapsApiKey': 'YOUR_GOOGLE_MAPS_API_KEY' // Optional, required if using maps features
      });

      // Set a callback to run when the Google Visualization API is loaded.
      google.charts.setOnLoadCallback(drawRegionsMap);

      // Callback that creates and populates a data table, 
      // instantiates the GeoChart, passes in the data and draws it.
      function drawRegionsMap() {
        var data = google.visualization.arrayToDataTable([
          ['Country', 'Status'], // Column 1 is for countries, Column 2 is for text labels
          ['United States', 'Critical'], // Example text labels
          ['India', 'Under Control'],
          ['Brazil', 'High Risk'],
          ['Russia', 'Moderate Risk'],
          ['France', 'High Risk'],
          ['Germany', 'Low Risk'],
          ['South Africa', 'Alert'],
          ['Australia', 'Safe']
        ]);

        // Set chart options
        var options = {
          colorAxis: { colors: ['#e6e6ff', '#0033cc', '#000066'] }, // Optional: Color range
          backgroundColor: '#f5f5f5', // Optional: Background color of the map
          datalessRegionColor: '#dedede', // Optional: Color for regions without data
          defaultColor: '#f5f5f5', // Default region color
          displayMode: 'text', // Display text labels instead of regions
          region: 'world', // Optional: Can be a region code like '002' for Africa
          resolution: 'countries',
        };

        // Instantiate and draw the chart, passing in the options.
        var chart = new google.visualization.GeoChart(document.getElementById('regions_div'));

        chart.draw(data, options);
      }
    </script>
  </head>

  <body>
    <!-- Div that will hold the GeoChart -->
    <div id="regions_div" style="width: 900px; height: 500px;"></div>
  </body>
</html>
