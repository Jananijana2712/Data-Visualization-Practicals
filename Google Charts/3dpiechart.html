<!DOCTYPE html>
<html>
  <head>
    <title>3D Pie Chart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ['Month', 'Confirmed Cases'],
          ['March', 1500],
          ['April', 25000],
          ['May', 45000],
          ['June', 70000],
          ['July', 90000]
        ]);

        var options = {
          title: 'COVID-19 Confirmed Cases Distribution (3D)',
          is3D: true,
          colors: ['#729762', '#E6D9A2', '#CB80AB', '#8967B3', '#624E88']
        };

        var chart = new google.visualization.PieChart(document.getElementById('three_d_pie_chart'));
        chart.draw(data, options);
      }
    </script>
  </head>
  <body>
    <div id="three_d_pie_chart" style="width: 900px; height: 500px;"></div>
  </body>
</html>
