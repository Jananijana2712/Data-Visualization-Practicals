<!DOCTYPE html>
<html>
<head>
    <title>Leaflet Map with Marker Clustering - India</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <style>
        #map {
            height: 500px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Leaflet Map with Marker Clustering - India</h1>
    <p>This map uses marker clustering to group markers efficiently, focusing on India.</p>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script>
        // Initialize the map centered on India
        var map = L.map('map').setView([20.5937, 78.9629], 5);

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Create a marker cluster group
        var markers = L.markerClusterGroup();

        // Generate 100 random markers across India
        for (var i = 0; i < 100; i++) {
            var lat = 20.5937 + (Math.random() - 0.5) * 10; // Adjust latitude range for India
            var lng = 78.9629 + (Math.random() - 0.5) * 10; // Adjust longitude range for India
            markers.addLayer(L.marker([lat, lng]).bindPopup("Random Marker " + i));
        }

        // Add the cluster group to the map
        map.addLayer(markers);
    </script>
</body>
</html>
